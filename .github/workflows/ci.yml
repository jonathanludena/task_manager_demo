name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # VITE_API_URL es necesaria para los tests de taskApi que mockean fetch.
  # Los módulos se importan antes de que vi.stubEnv pueda ejecutarse,
  # por lo que la variable debe estar disponible desde el inicio.
  VITE_API_URL: http://localhost:3000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      frontend_image: ${{ steps.images.outputs.frontend }}
      backend_image: ${{ steps.images.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:main-${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:main-${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
      - name: Set image outputs
        id: images
        run: |
          echo "frontend=ghcr.io/${{ github.repository }}/frontend:main-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "backend=ghcr.io/${{ github.repository }}/backend:main-${{ github.sha }}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  test-e2e:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: apps/frontend
      - name: Install system deps
        run: npx playwright install-deps chromium
        working-directory: apps/frontend
      - name: Run E2E tests
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend_image }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FRONTEND_IMAGE,BACKEND_IMAGE
          script: |
            cd ${{ secrets.VPS_APP_PATH }}
            bash deploy.sh
