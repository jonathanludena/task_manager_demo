# ── Outer Nginx — SSL Termination + Subdomain Routing ─────
# This is the edge reverse proxy deployed on the VPS.
# It handles:
#   • SSL termination with Let's Encrypt certificates
#   • HTTP → HTTPS redirect (301)
#   • ACME challenge webroot for certbot
#   • Subdomain routing to internal Docker services
#
# Inner nginx (apps/frontend/nginx.conf) remains untouched.
# Service names "frontend" and "backend" are resolved by
# Docker's internal DNS — no envsubst needed.

worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Default Server: reject unknown hostnames ───────────
    # Port 80 — plain HTTP, no TLS needed
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # Port 443 — must complete TLS handshake to inspect SNI,
    # then return 444. Uses whatever cert is mounted (could be
    # self-signed or real — cert mismatch warning is acceptable).
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        return 444;
    }

    # ── HTTP → HTTPS Redirect ──────────────────────────────
    # Handles both subdomains on port 80.
    # ACME challenge requests are served directly (certbot
    # HTTP-01 validation needs port 80 without redirect).
    server {
        listen 80;
        server_name app-challenge-0526.lproconsulting.com
                    api-challenge-0526.lproconsulting.com;

        # certbot webroot — HTTP-01 validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else → permanent redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: Frontend SPA ────────────────────────────────
    # Proxies to internal frontend:80 (embedded nginx serving
    # the Vite SPA build + internal /tasks and /health proxy).
    server {
        listen 443 ssl;
        server_name app-challenge-0526.lproconsulting.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Mozilla Intermediate — TLS 1.2+, modern ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # certbot webroot — TLS-ALPN-01 fallback
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS: Backend API ─────────────────────────────────
    # Proxies to internal backend:3000 (Fastify).
    server {
        listen 443 ssl;
        server_name api-challenge-0526.lproconsulting.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # certbot webroot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://backend:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
