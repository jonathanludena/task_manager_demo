server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ──────────────────────────────────
    # Redirige requests de API al backend en la red interna de Docker.
    # El frontend usa URLs relativas (sin VITE_API_URL) cuando
    # corre bajo nginx en producción.

    location /tasks {
        proxy_pass http://__API_HOST__:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Internal-Secret __INTERNAL_SECRET__;
    }

    location /health {
        proxy_pass http://__API_HOST__:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Internal-Secret __INTERNAL_SECRET__;
    }

    # ── SPA ────────────────────────────────────────────────
    # Sirve el build estático. Cualquier ruta que no sea API
    # cae en index.html para que React Router maneje la ruta.

    location / {
        try_files $uri $uri/ /index.html;
    }
}
